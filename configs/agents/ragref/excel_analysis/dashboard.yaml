                "data_hint": "从报告提取总营收：15.8亿，增长28.5%",
                "style_hint": "使用蓝色主题，图标 chart-line"
              },
              {
                "type": "kpi",
                "span": 3,
                "content": "订单数",
                "data_hint": "从报告提取订单量：12,450单",
                "style_hint": "使用橙色主题，图标 shopping-cart"
              },
              {
                "type": "kpi",
                "span": 3,
                "content": "客单价",
