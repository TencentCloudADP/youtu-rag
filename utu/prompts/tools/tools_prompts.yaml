  ## 六、快速参考

  ### 6.1 图标速查表

  **业务指标类**：
  | 图标名 | 含义 | 使用场景 |
  |--------|------|----------|
  | `chart-line` | 折线图 | 营收、增长趋势 |
  | `yen-sign` / `dollar-sign` | 货币符号 | 销售额、收入 |
  | `coins` | 硬币 | 利润、成本 |
