  ## 七、执行流程（单轮完成）

  ### 步骤 1：理解布局设计

  查看 `layout`，了解：
  - 看板标题和更新时间
  - 每行有多少个模块
  - 每个模块的类型（kpi/pie/insights 等）
  - 每个模块的 `data_hint`（需要提取什么数据）
  - 每个模块的 `style_hint`（颜色、图标等样式）

  ### 步骤 2：从报告提取数据

  根据每个模块的 `data_hint`，从 `markdown` 中提取对应数据：
  - 数值型数据：营收、利润、增长率等
  - 表格型数据：各渠道销售额、各品类数据等
  - 序列型数据：月度趋势、季度对比等
  - 文本型数据：洞察、结论、建议等

  **⚠️ 重要**：所有数据必须来自 `markdown`，不可编造！

  ### 步骤 3：数据完整性检查与布局调整 🔥

  **提取数据后，逐个检查每个模块的数据是否充足**：

  1. **检查最低数据要求**：
    - 雷达图（radar）：至少 5 个维度
    - 折线图（line）：至少 4 个时间点
    - 柱状图（column）/环形图（pie）/条形图（bar）：至少 2 个类别
    - 表格（table）：至少 2 行数据
    - 多指标卡片（metric_cards）：至少 3 个指标
    - 时间轴（timeline）：至少 2 个事件
    - **特色功能卡片（feature）：至少 3 个，必须在同一行（禁止单独使用或少于 3 个）**

  2. **数据不足时的处理**：
    - **取消该卡片**：从该行的 `modules` 中移除
    - **调整同行其他卡片宽度**：按比例扩大剩余卡片的 span，使总和尽可能接近 12
    - **特殊处理**：
      - 如果整行只有 1 个卡片且数据不足 → 整行删除
      - 如果取消后剩余 1 个卡片 → span 调整为 12
      - KPI/Stats Card 行 → 剩余卡片 span 总和必须 = 12

  3. **调整示例**（参考"三、数据不足时的布局调整策略"）

  ### 步骤 4：构建配置字典

  **根据调整后的布局构建配置**：
  - 使用纯字典格式生成数据
  - 每个模块必须包含 `type`、`span`、`data` 三个字段
  - span 已按步骤 3 调整完毕

  **🔒 关键检查（构建前必须执行）**：
  1. **卡片类型检查**：确保 `type` 字段是 17 种允许类型之一
  2. **字段合法性检查**：对照「五、模块详细说明」中的配置示例，确保：
    - 只使用示例中定义的字段
    - 没有添加任何自创字段
    - 必填字段已填写
    - 字段名称拼写正确
  3. **数据格式检查**：确保数据类型正确（字符串/数字/数组/对象）

  **示例**：
  ```json
  {
      "title": "2024年度业务分析看板",
      "subtitle": "基于全年销售数据",
      "update_time": "2026-01-15",
      "rows": [
          {
              "modules": [
                  {
                      "type": "kpi",
                      "span": 3,
                      "data": {
                          "label": "年度营收",
                          "value": "15.8",
                          "unit": "亿",
                          "icon": "chart-line",
                          "color": "blue",
                          "sub_label": "同比增长",
                          "badge": "+28.5% ↑"
                      }
                  },
                  {
                      "type": "kpi",
                      "span": 3,
                      "data": {
                          "label": "订单数",
                          "value": "12,450",
                          "unit": "单",
                          "icon": "shopping-cart",
                          "color": "orange"
                      }
                  }
              ]
          },
          {
              "modules": [
                  {
                      "type": "pie",
                      "span": 6,
                      "data": {
                          "title": "各渠道营收占比",
                          "data": [
                              {"name": "移动App", "value": 14994386.60},
                              {"name": "PC官网", "value": 12645000.00}
                          ],
                          "center_label": "总销售额"
                      }
                  },
                  {
                      "type": "insights",
                      "span": 6,
                      "data": {
                          "title": "核心洞察",
                          "insights": [
                              {
                                  "title": "云计算业务增长迅猛",
                                  "description": "Q4同比增长156%，建议加大投入",
                                  "color": "#3b82f6"
                              }
                          ]
                      }
                  }
              ]
          }
      ]
  }
  ```

  ### 步骤 5：输出配置字典

  直接输出配置字典，格式：
  ```json
  {
      ...
  }
  ```

  **✅ 单轮对话完成，无需等待反馈！**

