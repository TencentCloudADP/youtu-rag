  ## 📊 图表可视化类

  ### 5.9 环形图 (`pie`)

  **用途**：展示各部分占总体的百分比（占比、品类分布等）

  **特点**：
  - 中心显示总计（自动格式化：万/亿/万亿）
  - 悬停显示详细数值和百分比
  - 底部图例说明
  - 支持多个数据项（建议3-6个）

  **数据字段**：
  ```python
  {
      "title": "收入来源分布",                   # 必填：图表标题
      "data": [                                 # 必填：数据数组
          {"name": "企业服务", "value": 62345678},
          {"name": "云计算", "value": 48976543},
          {"name": "软件授权", "value": 32456789}
      ],
      "center_label": "总收入",                  # 可选：中心标签（默认"总计"）
      "series_name": "占比"                      # 可选：系列名称（默认"占比"）
  }
  ```

  **重要提示**：
  - `value` 必须是原始数值，不要手动转换单位
  - 系统会自动格式化中心数值（支持万/亿/万亿）

  **配置示例**：
  ```python
  {
      "type": "pie",
      "span": 4,
      "data": {
          "title": "收入来源分布",
          "data": [
              {"name": "企业服务", "value": 62345678},
              {"name": "云计算", "value": 48976543}
          ],
          "center_label": "总收入"
      }
  }
  ```

  ---

  ### 5.10 条形图 (`bar`)

  **用途**：横向条形图（同类数据排名、对比等）

  **特点**：
  - **自动按数值升序排列**（从小到大）
  - 渐变色柱状条
  - 支持自定义标签格式
  - 适合5-8个数据项

  **数据字段**：
  ```python
  {
      "title": "各部门业绩完成率",             # 必填：图表标题
      "data": [                               # 必填：数据数组（会自动排序）
          {"name": "销售部", "value": 128.5},
          {"name": "研发部", "value": 115.3},
          {"name": "市场部", "value": 95.2}
      ],
      "label_formatter": "{c}%"               # 可选：标签格式（默认 {c}%）
  }
  ```

  **配置示例**：
  ```python
  {
      "type": "bar",
      "span": 4,
      "data": {
          "title": "各部门业绩完成率",
          "data": [
              {"name": "销售部", "value": 128.5},
              {"name": "研发部", "value": 115.3}
          ],
          "label_formatter": "{c}%"
      }
  }
  ```

  ---

  ### 5.11 折线图 (`line`) 🔥

  **用途**：展示时间序列数据的变化趋势，支持多条折线对比

  **特点**：
  - 支持多条折线同时展示
  - 平滑曲线效果
  - 自动单位格式化（万/亿/万亿）
  - 悬停交叉十字线
  - 可选面积填充效果
  - 图例自动生成
  - **支持自定义坐标轴标签**

  **⚠️ 关键要求（避免渲染失败）**：
  1. **`categories` 必须是字符串数组**（不能是数字）
  2. **`series` 中每个系列必须包含 `name` 和 `data` 字段**
  3. **`data` 数组长度必须与 `categories` 一致**
  4. **`data` 必须是原始数值**（不要手动转换单位）
  5. **`color` 必须是完整的十六进制颜色值**（如 `#3b82f6`）

  ---

  **数据字段**：
  ```python
  {
      "title": "月度销售趋势",                # 必填：图表标题
      "categories": ["1月", "2月", "3月", "4月", "5月", "6月"],  # 必填：X轴类别（字符串数组）
      "series": [                              # 必填：系列数据数组（支持多条折线）
          {
              "name": "产品A销售额",        # 必填：系列名称
              "data": [120000, 132000, 141000, 154000, 160000, 175000],  # 必填：原始数值数组
              "color": "#3b82f6",           # 可选：线条颜色（默认自动分配）
              "showArea": true              # 可选：是否显示面积（默认False）
          },
          {
              "name": "产品B销售额",
              "data": [80000, 90000, 95000, 105000, 115000, 130000],
              "color": "#10b981"            # 默认不显示面积
          }
      ],
      "xaxis_name": "月份",                    # 可选：X轴名称标签
      "yaxis_name": "销售额"                   # 可选：Y轴名称标签
  }
  ```

  **重要提示**：
  - 当设置 `showArea: true` 时，系统会**自动生成**渐变色（基于 `color` 字段）
  - 不建议手动指定渐变色，除非有特殊需求

  ---

  **✅ 正确示例 1：单条折线（最简配置）**
  ```python
  {
      "type": "line",
      "span": 6,
      "data": {
          "title": "月度销售额趋势",
          "categories": ["1月", "2月", "3月", "4月", "5月", "6月"],
          "series": [
              {
                  "name": "销售额",
                  "data": [120000, 132000, 141000, 154000, 160000, 175000]
              }
          ]
      }
  }
  ```

  **✅ 正确示例 2：多条折线对比**
  ```python
  {
      "type": "line",
      "span": 8,
      "data": {
          "title": "各业务线月度营收趋势",
          "categories": ["1月", "2月", "3月", "4月", "5月", "6月"],
          "series": [
              {
                  "name": "企业服务",
                  "data": [5200000, 5450000, 5680000, 5920000, 6150000, 6380000],
                  "color": "#3b82f6"
              },
              {
                  "name": "云计算",
                  "data": [3100000, 3350000, 3680000, 4020000, 4450000, 4890000],
                  "color": "#10b981"
              }
          ]
      }
  }
  ```

  **✅ 正确示例 3：带面积填充 + 坐标轴标签**
  ```python
  {
      "type": "line",
      "span": 6,
      "data": {
          "title": "季度利润增长趋势",
          "categories": ["Q1", "Q2", "Q3", "Q4"],
          "series": [
              {
                  "name": "2023年",
                  "data": [8500000, 9200000, 10100000, 11800000],
                  "color": "#3b82f6",
                  "showArea": true
              },
              {
                  "name": "2024年",
                  "data": [10200000, 11500000, 13200000, 15600000],
                  "color": "#10b981",
                  "showArea": true
              }
          ],
          "xaxis_name": "季度",
          "yaxis_name": "利润"
      }
  }
  ```

  ---

  **重要提示**：
  1. **`data` 必须是原始数值**：系统会自动格式化单位（万/亿/万亿）
  2. **支持任意多条折线**：颜色会自动循环分配（如果不指定 color）
  3. **`xaxis_name` 和 `yaxis_name` 可选**：用于说明坐标轴含义
  4. **面积填充可选**：`showArea: true` 启用，系统会自动生成渐变色

  ---

  ### 5.12 柱状图 (`column`)

  **用途**：展示多组数据的对比（年度对比、地区对比等）

  **特点**：
  - 支持多组柱子并排展示
  - 自动单位格式化（万/亿/万亿）
  - 图例自动生成
  - 柱子宽度限制（最大40px）
  - 悬停阴影效果
  - **支持自定义坐标轴标签**

  **数据字段**：
  ```python
  {
      "title": "各地区销售额对比",            # 必填：图表标题
      "categories": ["华东", "华南", "华北", "华中", "西南", "西北"],  # 必填：X轴类别
      "series": [                              # 必填：系列数据数组（多组柱子）
          {
              "name": "2023年",
              "data": [82000000, 93200000, 90100000, 93400000, 78000000, 65000000],  # 原始数值
              "color": "#3b82f6"            # 可选：柱子颜色（默认自动分配）
          },
          {
              "name": "2024年",
              "data": [98000000, 112000000, 105000000, 120000000, 89000000, 75000000],
              "color": "#10b981"
          }
      ],
      "xaxis_name": "地区",                    # 可选：X轴名称标签
      "yaxis_name": "销售额"                   # 可选：Y轴名称标签
  }
  ```

  **重要提示**：
  - `data` 必须是原始数值，系统会自动格式化单位
  - 支持任意多组柱子，颜色会自动循环分配
  - `xaxis_name` 和 `yaxis_name` 可选，用于说明坐标轴含义

  **配置示例**：
  ```python
  {
      "type": "column",
      "span": 6,
      "data": {
          "title": "各地区销售额对比",
          "categories": ["华东", "华南", "华北"],
          "series": [
              {
                  "name": "2023年",
                  "data": [82000000, 93200000, 90100000],
                  "color": "#3b82f6"
              },
              {
                  "name": "2024年",
                  "data": [98000000, 112000000, 105000000],
                  "color": "#10b981"
              }
          ],
          "xaxis_name": "地区",
          "yaxis_name": "销售额"
      }
  }
  ```

  ---

  ### 5.13 雷达图 (`radar`)

  **用途**：多维度能力评估（5-8个维度），适合在同一尺度下展示多方面指标

  **特点**：
  - 圆形雷达图布局
  - 支持多个数据系列对比
  - 面积填充效果
  - 适合综合能力评估

  **数据字段**：
  ```python
  {
      "title": "企业综合能力评估",              # 必填：标题
      "subtitle": "基于6大核心维度的评估分析",  # 可选：副标题
      "indicators": [                           # 必填：雷达图维度（5-8个为宜）
          {"name": "技术创新", "max": 100},
          {"name": "市场占有率", "max": 100},
          {"name": "品牌影响力", "max": 100},
          {"name": "客户满意度", "max": 100},
          {"name": "财务健康度", "max": 100},
          {"name": "团队战斗力", "max": 100}
      ],
      "data": [                                 # 必填：数据数组（支持多组对比）
          {
              "value": [88, 76, 82, 91, 85, 79],
              "name": "2025年Q1",
              "areaStyle": {"color": "rgba(59, 130, 246, 0.3)"},
              "lineStyle": {"color": "#3b82f6"}
          }
      ],
      "series_name": "能力指数"                 # 可选：系列名称（默认"数据"）
  }
  ```

  **配置示例**：
  ```python
  {
      "type": "radar",
      "span": 8,
      "data": {
          "title": "企业综合能力评估",
          "subtitle": "基于6大核心维度的评估分析",
          "indicators": [
              {"name": "技术创新", "max": 100},
              {"name": "市场占有率", "max": 100},
              {"name": "品牌影响力", "max": 100},
              {"name": "客户满意度", "max": 100},
              {"name": "财务健康度", "max": 100},
              {"name": "团队战斗力", "max": 100}
          ],
          "data": [
              {
                  "value": [88, 76, 82, 91, 85, 79],
