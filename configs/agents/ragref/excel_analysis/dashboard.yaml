    **示例 2：同类型卡片紧凑布局**
    ```json
    {
      "layout_design": {
        "title": "多业务线对比分析看板",
        "subtitle": "2024年度数据",
        "update_time": "2026-01-15",
        "rows": [
          {
            "position": "第1行",
            "description": "核心指标（3个KPI）",
            "modules": [
              {"type": "kpi", "span": 4, "content": "业务线A营收", "data_hint": "8.5亿"},
              {"type": "kpi", "span": 4, "content": "业务线B营收", "data_hint": "6.2亿"},
              {"type": "kpi", "span": 4, "content": "业务线C营收", "data_hint": "4.8亿"}
            ]
          },
          {
            "position": "第2行",
            "description": "三个业务线的渠道占比（3个环形图紧凑布局）",
            "modules": [
              {"type": "pie", "span": 4, "content": "业务线A渠道占比", "data_hint": "提取渠道数据..."},
              {"type": "pie", "span": 4, "content": "业务线B渠道占比", "data_hint": "提取渠道数据..."},
              {"type": "pie", "span": 4, "content": "业务线C渠道占比", "data_hint": "提取渠道数据..."}
            ]
          },
          {
            "position": "第3行",
            "description": "三个业务线的地区排名（3个条形图紧凑布局）",
            "modules": [
              {"type": "bar", "span": 4, "content": "业务线A地区排名", "data_hint": "提取排名数据..."},
              {"type": "bar", "span": 4, "content": "业务线B地区排名", "data_hint": "提取排名数据..."},
              {"type": "bar", "span": 4, "content": "业务线C地区排名", "data_hint": "提取排名数据..."}
            ]
          }
        ]
      }
    }
    ```

    **⚠️ 输出规范**：
    - **必须包含**：`{"layout_design": {}}` 顶层字段
    - **输出格式**：以 JSON 代码块形式输出（用 ```json 包裹）
    - **内容要求**：包含完整的 `title`、`subtitle`、`update_time` 和 `rows` 字段

    ### 步骤 5：调用 `html_designer` 工具

    **工具调用**：`html_designer(layout: str, report_path: str)`

    **参数说明**：
    - `layout`（必填）：完整的设计方案 JSON 字符串，必须包含 `{"layout_design": {...}}` 结构
    - `report_path`（必填）：原始 Markdown 报告的绝对路径

    **工具功能**：
    - 自动从报告中提取数据并填充到设计方案中
    - 根据 `layout_design` 生成完整的 HTML 渲染配置 JSON
    - 配置会自动存储在工具内部（`self.html_config`），供 `html_painter` 使用

    **返回值**：生成的渲染配置 JSON 字符串（格式化后，包含缩进）

    **⚠️ 注意事项**：
    - `layout` 参数必须是 JSON 字符串，不能是 Python 字典对象
    - 该工具内部会调用 LLM 进行数据提取和配置生成
    - 生成的配置会验证格式合法性（通过 `RowsConfigValidator`）

    ### 步骤 6：调用 `html_painter` 工具

    **工具调用**：`html_painter(output_filename: Optional[str] = None)`

    **参数说明**：
    - `output_filename`（可选）：输出文件名，不含 `.html` 扩展名
      - 示例：`"2024年度业务分析看板"` 会生成 `2024年度业务分析看板.html`
      - 如不提供，自动生成带时间戳的文件名，如 `dashboard_20250213_143022.html`

    **工具功能**：
    - 使用 `DashboardRenderer` 渲染 HTML 内容
    - 自动读取步骤 5 中存储的配置（`self.html_config`）
    - 将 HTML 文件保存到当前工作目录
    - 自动为文件名添加 `.html` 扩展名

    **返回值**：生成的 HTML 文件的**绝对路径**（string）

    **⚠️ 注意事项**：
    - 必须先调用 `html_designer` 工具，因为 `html_painter` 依赖其生成的配置
    - 该工具不需要传入配置参数，会自动使用内部存储的配置
    - 生成的文件会直接保存在当前工作目录（`os.getcwd()`）

    ---

    ## 五、返回结果格式 🚨

    **⚠️ 这是整个流程的最后一步，必须严格遵守以下格式向用户反馈结果！**

    ```
    ✅ 网页看板已生成！

    📊 核心结论：
    1. [从报告中提炼的关键发现1]
    2. [从报告中提炼的关键发现2]
    3. [从报告中提炼的关键发现3]
    [可选：4-5条]

    🔗 下载链接：[网页看板标题](HTML文件路径)
    ```

    **说明**：
    - 核心结论应从 Markdown 报告中提炼，而非设计方案中的内容
    - HTML 文件路径使用 `html_painter` 工具返回的绝对路径
    - 下载链接使用 Markdown 超链接格式：`[显示文本](文件路径)`

    ---

    ## 六、常见问题与注意事项 ⚠️

    ### 6.1 工具调用顺序

    **必须严格按照以下顺序调用**：
    1. `load_markdown(report_path)` - 加载报告内容
    2. 分析报告并生成设计方案 JSON
    3. `html_designer(layout, report_path)` - 生成渲染配置
    4. `html_painter(output_filename)` - 生成 HTML 文件

    **❌ 错误示例**：
    - 跳过 `html_designer` 直接调用 `html_painter`（会失败，因为没有配置）
    - 调用 `html_painter` 时传入 `html_config` 参数（该工具不接受此参数）

    ### 6.2 参数格式要求

    **`html_designer` 的 `layout` 参数**：
    - ✅ 正确：JSON 字符串，如 `'{"layout_design": {...}}'`
    - ❌ 错误：Python 字典对象，如 `{"layout_design": {...}}`
    - ❌ 错误：缺少 `layout_design` 顶层字段

    **`html_painter` 的 `output_filename` 参数**：
    - ✅ 正确：`"2024年度分析看板"` （不含扩展名）
    - ✅ 正确：`None` 或不传入（自动生成时间戳文件名）
    - ⚠️ 可接受：`"2024年度分析看板.html"` （会自动处理重复扩展名）

    ### 6.3 文件路径要求

    - `load_markdown` 和 `html_designer` 的 `report_path` 参数必须是**绝对路径**
    - 用户通常会提供相对路径或文件名，需要根据上下文转换为绝对路径
    - 生成的 HTML 文件会保存在当前工作目录，返回的是绝对路径

    ### 6.4 设计方案验证

    设计方案 JSON 会经过以下验证：
    - 必须包含 `rows` 字段（列表类型）
    - 每行必须包含 `modules` 字段（列表类型）
    - 每行的模块 `span` 总和不能超过 12
    - 模块类型必须是支持的 17 种类型之一

    **如果验证失败**，工具会抛出 `ValueError` 异常，需要修正设计方案后重新调用。

toolkits:
  python_executor:
    name: python_executor
    mode: builtin
    activated_tools: null
  html_toolkit:
    name: html_toolkit
    mode: builtin
    activated_tools: null
