  ## 八、核心原则

  1. **数据优先，灵活调整** 🔥：
    - 数据充足时：严格遵循 `layout` 的布局结构
    - 数据不足时：主动取消卡片并调整同行其他卡片宽度
    - **禁止编造数据来填充卡片**
  2. **忠实提取 `markdown` 数据**：所有数据必须从报告中提取，不编造
  3. **数据完整性检查**：提取数据后检查是否满足最低渲染要求
  4. **使用纯字典格式**：所有配置使用纯字典格式
  5. **保持数值原始性**：图表数据使用原始数值，系统会自动格式化
  6. **返回 dict 类型**：配置必须是字典，而非字符串
  7. **单轮完成**：无需多轮对话，直接输出最终配置字典
  8. **🔒 严格遵守字段定义**（最高优先级）：
    - **只使用「五、模块详细说明」中每种卡片的配置示例里定义的字段**
    - **禁止添加任何未定义的字段**（如 description、subtitle、tooltip 等）
    - **必填字段必须填写，可选字段可选择性填写**
    - 生成配置前必须逐个检查字段是否合法

