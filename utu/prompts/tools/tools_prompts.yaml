  ## 💬 信息传达类

  ### 5.14 引用卡片 (`quote`)

  **用途**：展示名言、CEO寄语、重要声明等

  **特点**：
  - 左侧蓝色边框
  - 斜体引用文字
  - 作者署名右对齐
  - 适合人文关怀内容

  **⚠️ 字段格式约束**：`text` 字段为纯文本字符串，**不支持 Markdown 格式**

  **数据字段**：
