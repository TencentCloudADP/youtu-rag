  ### 5.15 通知卡片 (`notification`)

  **用途**：展示多条系统通知、重要公告

  **特点**：
  - 4 种通知类型：`success`（成功）、`info`（信息）、`warning`（警告）、`error`（错误）
  - 不同类型有不同背景色和图标色
  - 左侧彩色边框

  **⚠️ 字段格式约束**：`content` 字段为纯文本字符串，**不支持 Markdown 格式**

  **数据字段**：
  ```python
  {
      "title": "重要通知",                  # 必填：标题
      "notifications": [                   # 必填：通知数组（3-5条为宜）
          {
              "type": "success",           # 必填：类型 (success/info/warning/error)
              "icon": "check-circle",      # 必填：图标名
              "title": "项目里程碑达成",    # 必填：通知标题
              "content": "AI平台已成功上线，首批100家企业接入完成。"  # 必填：通知内容（纯文本，不支持Markdown）
          },
          {
              "type": "warning",
              "icon": "exclamation-triangle",
              "title": "预算预警",
              "content": "Q1市场费用已使用78%，请合理控制。"  # 纯文本，不支持Markdown
          }
      ]
  }
  ```

  **配置示例**：
  ```python
  {
      "type": "notification",
      "span": 6,
      "data": {
          "title": "重要通知",
          "notifications": [
              {
                  "type": "success",
                  "icon": "check-circle",
                  "title": "项目达成",
                  "content": "AI平台已上线。"
              }
          ]
      }
  }
  ```

