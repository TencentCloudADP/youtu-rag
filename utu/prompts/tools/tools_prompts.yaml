  ### 5.6 洞察列表 (`insights`)

  **用途**：展示数据分析结论和业务建议

  **特点**：
  - 彩色圆点标识
  - 标题 + 描述两级结构
  - 适合放在图表旁边作为分析结论

  **⚠️ 关键字段**：必须包含 `color` 字段，每个 insight 是独立的字典（不再使用 `create_insight()` 方法）

  **⚠️ 字段格式约束**：`description` 字段为纯文本字符串，**不支持 Markdown 格式**

  **数据字段**：
  ```python
  {
      "title": "核心洞察",              # 必填：标题
      "insights": [                       # 必填：洞察数组（3-5条为宜）
          {
              "title": "云计算业务增长迅猛",
              "description": "Q4同比增长156%，成为新的增长引擎。建议加大云原生技术投入。",  # 纯文本，不支持Markdown
              "color": "#3b82f6"             # 必填：圆点颜色
          },
          {
              "title": "客户留存率提升",
              "description": "年度留存率达92.3%，创历史新高。",  # 纯文本，不支持Markdown
              "color": "#10b981"
          }
      ]
  }
  ```

  **配置示例**：
  ```python
  {
      "type": "insights",
      "span": 6,
      "data": {
          "title": "核心洞察",
          "insights": [
              {
                  "title": "云计算业务增长迅猛",
                  "description": "Q4同比增长156%，建议加大投入",
                  "color": "#3b82f6"
              }
          ]
      }
  }
  ```

