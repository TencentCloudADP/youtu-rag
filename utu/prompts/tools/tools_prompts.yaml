  ### 5.2 统计数字卡片 (`stats_card`)

  **用途**：带变化率的统计卡片，适合对比展示

  **特点**：
  - 居中布局，圆形图标
  - 右上角显示变化百分比（正/负）
  - 悬停动画效果
  - 适合展示关键指标趋势

  **数据字段**：
  ```python
  {
      "number": "1,245",           # 必填：数值（可含单位）
      "label": "新增客户数",        # 必填：标签
      "icon": "user-plus",         # 必填：图标名
      "icon_color": "#3b82f6",     # 可选：图标背景色
      "change": 18.6               # 可选：变化率（正数为增长，负数为下降）
  }
  ```

  **配置示例**：
  ```python
  {
      "type": "stats_card",
      "span": 3,
      "data": {
          "number": "1,245",
          "label": "新增客户数",
          "icon": "user-plus",
          "icon_color": "#3b82f6",
          "change": 18.6
      }
  }
  ```

