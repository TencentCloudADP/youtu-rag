  {
      "text": "创新是引领发展的第一动力。我们要以技术创新为驱动，为客户创造更大价值。",  # 必填：引用文字（纯文本，不支持Markdown）
      "author": "CEO 张伟"                   # 必填：作者
  }
  ```

  **配置示例**：
  ```python
  {
      "type": "quote",
      "span": 6,
      "data": {
          "text": "创新是第一动力，我们要坚持以客户为中心。",
          "author": "CEO 张伟"
      }
  }
