  ### 6.3 常见问题 FAQ

  **Q1: `metric_cards` 和 `bar` 有什么区别？**
  - `metric_cards`：展示**不同单位**的指标（响应时间 ms、转化率 %、用户数 人）
  - `bar`：展示**同单位**数据的排行（各渠道利润率 %、各品类销量 件）

  **Q2: 每行的 span 总和必须等于 12 吗？**
  - 不必须，可以 < 12（右侧留白），但不能 > 12（会报错）
  - 建议尽量接近 12，充分利用空间

  **Q3: `kpi` 和 `stats_card` 有什么区别？**
  - `kpi`：彩色渐变背景，适合首行核心指标，视觉冲击力强
  - `stats_card`：白色卡片，圆形图标，适合第二行补充指标，带变化率显示

  **Q4: `text` 和 `gradient_text` 有什么区别？**
  - `text`：普通白色卡片，适合数据说明、报告摘要
  - `gradient_text`：紫色渐变背景，适合战略目标、重点内容

  **Q5: 折线图和柱状图有什么区别？**
  - `line`：展示**时间序列趋势**，连续的数据变化（月度销售、增长趋势等），平滑曲线
  - `column`：展示**多组数据对比**，离散的数据比较（年度对比、地区对比等），柱状并排

  **Q6: 折线图和柱状图可以支持几条系列？**
  - **支持任意多条系列**！系统会自动分配颜色
  - 建议 2-4 条系列，保持图表可读性
  - 如果数据维度过多（5+），建议拆分为多个图表

  **Q7: 雷达图适合展示什么数据？**
  - 适合展示5-8个维度的综合评估
  - 所有维度必须在同一量纲（如都是0-100分）
  - 用于多维度能力分析、综合评估等场景
  - 不适合维度过少（<5个）或过多（>10个）的情况

  **Q8: 洞察列表应该写多少条？**
  - 建议 3-5 条，每条 1-2 句话，突出关键发现
  - 每条配不同颜色,便于区分

  **Q9: 通知卡片有哪些类型？**
  - `success`（成功）：绿色，适合完成/达成类通知
  - `info`（信息）：蓝色，适合一般信息类通知
  - `warning`（警告）：橙色，适合提醒/预警类通知
  - `error`（错误）：红色，适合异常/错误类通知

  **Q10: 如果报告中的数据不足以支撑某个卡片，怎么办？** 🔥
  - **不要编造数据！** 主动调整布局：
    1. **取消该卡片**：从该行的 `modules` 中移除
    2. **调整同行其他卡片宽度**：按比例扩大剩余卡片的 span，使总和尽可能接近 12
    3. **特殊处理**：
      - 整行只有 1 个卡片且数据不足 → 整行删除
      - 取消后剩余 1 个卡片 → span 调整为 12
      - KPI/Stats Card 行 → 剩余卡片 span 总和必须 = 12
  - 详细规则参考"三、数据不足时的布局调整策略"

  **Q11: 哪些卡片对数据量有最低要求？**
  | 卡片类型 | 最低要求 |
  |---------|---------|
  | 雷达图（radar） | 至少 5 个维度 |
  | 折线图（line） | 至少 4 个时间点 |
  | 柱状图（column）/环形图（pie）/条形图（bar） | 至少 2 个类别 |
  | 表格（table） | 至少 2 行数据 |
  | 多指标卡片（metric_cards） | 至少 3 个指标 |
  | 时间轴（timeline） | 至少 2 个事件 |
  | **特色功能卡片（feature）** | **至少 3 个，必须在同一行** |

  **Q12: `feature` 卡片为什么必须 3-4 个在一行？**
  - `feature` 卡片采用居中布局设计，单独使用或数量过少会导致视觉效果不佳
  - **强制要求**：必须 3-4 个在同一行出现（span 建议 3-4）
  - **禁止**：单独使用、只有 1-2 个 feature 卡片
  - **正确示例**：`[{"type": "feature", "span": 3}, {"type": "feature", "span": 3}, {"type": "feature", "span": 3}, {"type": "feature", "span": 3}]`

