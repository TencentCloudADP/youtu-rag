  ### 5.4 进度条卡片 (`progress`)

  **用途**：展示多个项目/目标的完成进度

  **特点**：
  - 支持多条进度条
  - 每条独立配色
  - 百分比数值显示
  - 适合目标达成率展示

  **⚠️ 关键字段名**：必须使用 `progress_items`，不是 `items`！

  **数据字段**：
  ```python
  {
      "title": "年度目标完成进度",          # 必填：标题
      "progress_items": [                  # 必填：进度项数组（注意是 progress_items）
          {
              "label": "营收目标",
              "value": 86,              # 必填：进度值（0-100）
              "color": "#3b82f6"        # 可选：进度条颜色
          },
          {
              "label": "用户增长",
              "value": 94,
              "color": "#10b981"
          }
      ]
  }
  ```

  **配置示例**：
  ```python
  {
      "type": "progress",
      "span": 6,
      "data": {
          "title": "年度目标完成进度",
          "progress_items": [
              {"label": "营收目标", "value": 86, "color": "#3b82f6"},
              {"label": "用户增长", "value": 94, "color": "#10b981"}
          ]
      }
  }
  ```

