  ### 5.3 多指标卡片组 (`metric_cards`)

  **用途**：展示多个**不同单位**的指标，纵向堆叠布局

  **与其他模块的区别**：
  - vs `kpi`：kpi 是单个大卡片，metric_cards 是多个小条目
  - vs `bar`：bar 用于同单位数据排名，metric_cards 用于不同单位数据并列
  - vs `stats_card`：stats_card 是独立卡片，metric_cards 是一组条目

  **数据字段**：
  ```python
  {
      "title": "核心经营指标",               # 必填：标题
      "metrics": [                          # 必填：指标数组（4-8个为宜）
          {
              "label": "毛利率",
              "value": "58.7",
              "unit": "%",
              "color": "#3b82f6",
              "icon": "chart-pie"        # 可选：图标
          },
          {
              "label": "净利率",
              "value": "18.4",
              "unit": "%",
              "color": "#10b981",
              "icon": "percent"
          }
      ]
  }
  ```

  **配置示例**：
  ```python
  {
      "type": "metric_cards",
      "span": 4,
      "data": {
          "title": "核心经营指标",
          "metrics": [
              {"label": "毛利率", "value": "58.7", "unit": "%", "color": "#3b82f6", "icon": "chart-pie"},
              {"label": "ROI", "value": "3.2", "unit": "倍", "color": "#f59e0b", "icon": "trophy"}
          ]
      }
  }
  ```

